<div class="work-order-form-page">
  <app-page-header [title]="isEdit ? 'Editar Orden de Trabajo' : 'Nueva Orden de Trabajo'" subtitle="Complete los datos de la orden">
    <button class="btn btn-link" (click)="goBack()"><span class="material-icons">arrow_back</span> Volver</button>
  </app-page-header>

  <app-loading-spinner *ngIf="loading" message="Cargando..."></app-loading-spinner>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!loading">
    <div class="detail-grid">
      <div class="detail-card">
        <h3>Información General</h3>
        <div class="form-group">
          <label>Título *</label>
          <input type="text" formControlName="title" placeholder="Ej: Aseo integral oficinas piso 3" />
        </div>
        <div class="form-group">
          <label>Descripción</label>
          <textarea formControlName="description" rows="3" placeholder="Describa el trabajo a realizar..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Tipo *</label>
            <select formControlName="order_type">
              <option *ngFor="let opt of typeOptions" [value]="opt.value">{{ opt.label }}</option>
            </select>
          </div>
          <div class="form-group">
            <label>Prioridad *</label>
            <select formControlName="priority">
              <option *ngFor="let opt of priorityOptions" [value]="opt.value">{{ opt.label }}</option>
            </select>
          </div>
        </div>
      </div>

      <div class="detail-card">
        <h3>Programación</h3>
        <div class="form-group">
          <label>Ubicación</label>
          <input type="text" formControlName="location" placeholder="Ej: Torre Alpha, Piso 3" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Fecha Programada</label>
            <input type="datetime-local" formControlName="scheduled_date" />
          </div>
          <div class="form-group">
            <label>Fecha de Vencimiento</label>
            <input type="datetime-local" formControlName="due_date" />
          </div>
        </div>
        <div class="form-group">
          <label>Notas</label>
          <textarea formControlName="notes" rows="3" placeholder="Notas adicionales..."></textarea>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary" (click)="goBack()">Cancelar</button>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid || saving">
        <span class="material-icons">{{ isEdit ? 'save' : 'add' }}</span>
        {{ isEdit ? 'Guardar Cambios' : 'Crear Orden' }}
      </button>
    </div>
  </form>
</div>
