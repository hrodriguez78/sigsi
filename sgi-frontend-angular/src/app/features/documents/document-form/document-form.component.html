<div class="document-form">
  <div class="document-form__header">
    <h1 class="document-form__title">{{ title }}</h1>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="document-form__body">
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Título <span class="required">*</span></label>
        <input
          type="text"
          class="form-input"
          formControlName="title"
          placeholder="Título del documento"
          [class.form-input--error]="f['title'].touched && f['title'].invalid"
        />
        <span class="form-error" *ngIf="f['title'].touched && f['title'].errors?.['required']">
          El título es requerido
        </span>
        <span class="form-error" *ngIf="f['title'].touched && f['title'].errors?.['minlength']">
          Mínimo 3 caracteres
        </span>
      </div>

      <div class="form-group">
        <label class="form-label">Código <span class="required">*</span></label>
        <input
          type="text"
          class="form-input"
          formControlName="code"
          placeholder="DOC-001"
          [class.form-input--error]="f['code'].touched && f['code'].invalid"
        />
        <span class="form-error" *ngIf="f['code'].touched && f['code'].errors?.['required']">
          El código es requerido
        </span>
      </div>

      <div class="form-group form-group--full">
        <label class="form-label">Descripción <span class="required">*</span></label>
        <textarea
          class="form-input form-textarea"
          formControlName="description"
          placeholder="Descripción del documento"
          rows="3"
          [class.form-input--error]="f['description'].touched && f['description'].invalid"
        ></textarea>
        <span class="form-error" *ngIf="f['description'].touched && f['description'].errors?.['required']">
          La descripción es requerida
        </span>
      </div>

      <div class="form-group">
        <label class="form-label">Tipo de Documento <span class="required">*</span></label>
        <select
          class="form-input"
          formControlName="document_type"
          [class.form-input--error]="f['document_type'].touched && f['document_type'].invalid"
        >
          <option *ngFor="let type of documentTypes" [value]="type.value">{{ type.label }}</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">ID de Proceso</label>
        <input
          type="text"
          class="form-input"
          formControlName="process_id"
          placeholder="Opcional"
        />
      </div>

      <div class="form-group form-group--full">
        <label class="form-label">Etiquetas</label>
        <input
          type="text"
          class="form-input"
          formControlName="tags"
          placeholder="Separadas por coma: seguridad, ISO, político"
        />
        <span class="form-hint">Separadas por coma</span>
      </div>

      <div class="form-group form-group--full">
        <label class="form-label">Contenido</label>
        <textarea
          class="form-input form-textarea form-textarea--lg"
          formControlName="content"
          placeholder="Contenido del documento..."
          rows="10"
        ></textarea>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn--secondary" (click)="cancel()">Cancelar</button>
      <button
        type="submit"
        class="btn btn--primary"
        [disabled]="form.invalid || submitting"
      >
        <span class="material-icons" *ngIf="!submitting">{{ isEditMode ? 'save' : 'add' }}</span>
        <span *ngIf="submitting">Guardando...</span>
        <span *ngIf="!submitting">{{ isEditMode ? 'Guardar Cambios' : 'Crear Documento' }}</span>
      </button>
    </div>
  </form>
</div>
