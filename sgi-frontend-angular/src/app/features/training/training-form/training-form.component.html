<div class="training-form">
  <h1>{{ isEdit ? 'Editar Curso' : 'Nuevo Curso' }}</h1>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-grid">
      <div class="form-group">
        <label>Título *</label>
        <input formControlName="title" type="text" placeholder="Nombre del curso" />
        <span class="error" *ngIf="form.get('title')?.touched && form.get('title')?.hasError('required')">
          El título es requerido
        </span>
      </div>

      <div class="form-group">
        <label>Código *</label>
        <input formControlName="code" type="text" placeholder="Ej: CAP-001" />
        <span class="error" *ngIf="form.get('code')?.touched && form.get('code')?.hasError('required')">
          El código es requerido
        </span>
      </div>

      <div class="form-group">
        <label>Categoría *</label>
        <select formControlName="category">
          <option *ngFor="let cat of categories" [value]="cat.value">{{ cat.label }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>Estado</label>
        <select formControlName="status">
          <option *ngFor="let s of statuses" [value]="s.value">{{ s.label }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>Duración (horas) *</label>
        <input formControlName="duration_hours" type="number" min="0.5" step="0.5" />
      </div>

      <div class="form-group">
        <label>Instructor</label>
        <input formControlName="instructor" type="text" placeholder="Nombre del instructor" />
      </div>

      <div class="form-group">
        <label>Máx. Participantes</label>
        <input formControlName="max_participants" type="number" min="1" placeholder="Sin límite" />
      </div>

      <div class="form-group checkbox-group">
        <label>
          <input formControlName="is_mandatory" type="checkbox" />
          Curso obligatorio
        </label>
      </div>
    </div>

    <div class="form-group full-width">
      <label>Descripción</label>
      <textarea formControlName="description" rows="3" placeholder="Descripción del curso"></textarea>
    </div>

    <div class="form-group full-width">
      <label>Etiquetas (separadas por coma)</label>
      <input formControlName="tags" type="text" placeholder="seguridad, iso27001, concienciacion" />
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-outline" (click)="router.navigate(['/training'])">Cancelar</button>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid">{{ isEdit ? 'Actualizar' : 'Crear' }}</button>
    </div>
  </form>
</div>
