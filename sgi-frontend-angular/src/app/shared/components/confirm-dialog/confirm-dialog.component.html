<div class="dialog-backdrop" *ngIf="open" (click)="onBackdropClick($event)">
  <div class="dialog" [ngClass]="'dialog--' + type">
    <div class="dialog__header">
      <h3>{{ title }}</h3>
    </div>
    <div class="dialog__body">
      <p>{{ message }}</p>
    </div>
    <div class="dialog__footer">
      <button class="btn btn-ghost" (click)="onCancel()">{{ cancelText }}</button>
      <button class="btn" [ngClass]="'btn--' + type" (click)="onConfirm()">
        {{ confirmText }}
      </button>
    </div>
  </div>
</div>
