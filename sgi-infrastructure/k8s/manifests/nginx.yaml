apiVersion: apps/v1
kind: Deployment
metadata:
  name: sgi-nginx
  namespace: sgi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sgi-nginx
  template:
    metadata:
      labels:
        app: sgi-nginx
    spec:
      containers:
      - name: nginx
        image: sgi-nginx:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sgi-nginx
  namespace: sgi
spec:
  type: LoadBalancer
  selector:
    app: sgi-nginx
  ports:
  - port: 80
    targetPort: 80
  - port: 443
    targetPort: 443
