apiVersion: apps/v1
kind: Deployment
metadata:
  name: sgi-ollama
  namespace: sgi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sgi-ollama
  template:
    metadata:
      labels:
        app: sgi-ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
            # nvidia.com/gpu: 1  # Uncomment for GPU support
        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama
  volumeClaimTemplates:
  - metadata:
      name: ollama-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: sgi-ollama
  namespace: sgi
spec:
  selector:
    app: sgi-ollama
  ports:
  - port: 11434
    targetPort: 11434
