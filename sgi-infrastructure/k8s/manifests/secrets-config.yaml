apiVersion: v1
kind: Secret
metadata:
  name: sgi-secrets
  namespace: sgi
type: Opaque
stringData:
  JWT_SECRET: "change-me-in-production-use-sealed-secrets"
  MONGO_PASSWORD: "change-me-mongo-password"
  POSTGRES_PASSWORD: "change-me-postgres-password"
  DJANGO_SECRET_KEY: "change-me-django-secret-key"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sgi-config
  namespace: sgi
data:
  MONGO_HOST: "mongodb://sgi-mongodb:27017"
  MONGO_DB: "sgi_db"
  POSTGRES_HOST: "sgi-postgresql"
  POSTGRES_DB: "sgi_django"
  POSTGRES_USER: "sgi_user"
  REDIS_HOST: "redis://sgi-redis:6379/0"
  OLLAMA_HOST: "http://sgi-ollama:11434"
  CORS_ORIGINS: '["https://sgi.example.com"]'
  DEBUG: "false"
