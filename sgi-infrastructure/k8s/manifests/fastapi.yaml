apiVersion: apps/v1
kind: Deployment
metadata:
  name: sgi-fastapi
  namespace: sgi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sgi-fastapi
  template:
    metadata:
      labels:
        app: sgi-fastapi
    spec:
      containers:
      - name: fastapi
        image: sgi-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: MONGO_HOST
          valueFrom:
            configMapKeyRef:
              name: sgi-config
              key: MONGO_HOST
        - name: MONGO_DB
          valueFrom:
            configMapKeyRef:
              name: sgi-config
              key: MONGO_DB
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: sgi-secrets
              key: JWT_SECRET
        - name: OLLAMA_HOST
          valueFrom:
            configMapKeyRef:
              name: sgi-config
              key: OLLAMA_HOST
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: sgi-config
              key: CORS_ORIGINS
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        readinessProbe:
          httpGet:
            path: /api/v1/ping
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: sgi-fastapi
  namespace: sgi
spec:
  selector:
    app: sgi-fastapi
  ports:
  - port: 8000
    targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sgi-fastapi-hpa
  namespace: sgi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sgi-fastapi
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
