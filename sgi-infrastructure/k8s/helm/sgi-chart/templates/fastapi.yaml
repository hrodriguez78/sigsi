{{- if .Values.fastapi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sgi-fastapi
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.fastapi.replicaCount }}
  selector:
    matchLabels:
      app: sgi-fastapi
  template:
    metadata:
      labels:
        app: sgi-fastapi
    spec:
      containers:
      - name: fastapi
        image: "{{ .Values.fastapi.image }}:{{ .Values.fastapi.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        ports:
        - containerPort: {{ .Values.fastapi.port }}
        env:
        - name: MONGO_HOST
          valueFrom:
            configMapKeyRef:
              name: sgi-config
              key: MONGO_HOST
        - name: MONGO_DB
          valueFrom:
            configMapKeyRef:
              name: sgi-config
              key: MONGO_DB
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: sgi-secrets
              key: JWT_SECRET
        - name: OLLAMA_HOST
          valueFrom:
            configMapKeyRef:
              name: sgi-config
              key: OLLAMA_HOST
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: sgi-config
              key: CORS_ORIGINS
        resources:
          {{- toYaml .Values.fastapi.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /api/v1/ping
            port: {{ .Values.fastapi.port }}
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: {{ .Values.fastapi.port }}
          initialDelaySeconds: 30
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: sgi-fastapi
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: sgi-fastapi
  ports:
  - port: {{ .Values.fastapi.port }}
    targetPort: {{ .Values.fastapi.port }}
{{- if .Values.fastapi.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sgi-fastapi-hpa
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sgi-fastapi
  minReplicas: {{ .Values.fastapi.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.fastapi.autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.fastapi.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
